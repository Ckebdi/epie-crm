<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion · EPIE Formation — Espace RH</title>
  <style>
    :root{
      --blue:#1f7fa8; --blue-d:#186a8d; --blue-lt:#e8f3f8;
      --green:#5d9b31; --green-d:#4c8127;
      --ink:#1c2e36; --ink2:#41545d; --ink3:#6d7f87; --ink4:#9aa9b0;
      --bg:#f2f6f8; --line:#dfe8ec; --rd:#c02626;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; min-height:100vh; background:var(--bg); color:var(--ink);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:24px;
    }
    .band{
      position:fixed; top:0; left:0; right:0; height:4px;
      background:linear-gradient(90deg,var(--green) 0%,var(--blue) 60%);
    }
    .card{
      background:#fff; border:1px solid var(--line); border-radius:14px;
      box-shadow:0 6px 30px rgba(28,46,54,.08);
      width:100%; max-width:400px; padding:36px 38px 28px;
    }
    .logo{ text-align:center; margin-bottom:6px; }
    .logo img{ height:56px; display:inline-block; }
    .wordmark{ font-size:30px; font-weight:800; letter-spacing:.04em; color:var(--blue); }
    .wordmark small{
      display:block; font-size:14px; font-weight:600; letter-spacing:.22em;
      color:var(--green); text-transform:lowercase; margin-top:-2px;
    }
    .divider{ height:1px; background:var(--line); margin:20px 0 18px; }
    h1{ font-size:15px; font-weight:700; margin:0 0 3px; text-align:center; }
    .sub{ font-size:12.5px; color:var(--ink3); text-align:center; margin-bottom:22px; }
    .fg{ margin-bottom:15px; }
    .fl{ display:block; font-size:12px; font-weight:600; color:var(--ink2); margin-bottom:5px; }
    .fc{
      width:100%; border:1px solid var(--line); border-radius:8px;
      padding:10px 12px; font-size:14px; color:var(--ink); background:#fff;
    }
    .fc:focus{ outline:none; border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-lt); }
    .btn{
      width:100%; border:none; border-radius:8px; background:var(--blue); color:#fff;
      padding:11px 0; font-size:14px; font-weight:600; cursor:pointer; margin-top:6px;
      font-family:inherit;
    }
    .btn:hover{ background:var(--blue-d); }
    .btn:disabled{ opacity:.6; cursor:default; }
    .err{ font-size:12.5px; color:var(--rd); margin-top:10px; min-height:17px; text-align:center; }
    .notice{
      margin-top:18px; padding-top:14px; border-top:1px solid var(--line);
      font-size:11.5px; color:var(--ink4); text-align:center; line-height:1.5;
    }
    .foot{ margin-top:18px; font-size:11.5px; color:var(--ink4); text-align:center; }
  </style>
</head>
<body>
  <div class="band"></div>
  <div class="card">
    <div class="logo">
      <div class="wordmark">EPIE<small>formation</small></div>
    </div>
    <div class="divider"></div>
    <h1>Espace Ressources Humaines</h1>
    <div class="sub">Connectez-vous avec vos identifiants internes</div>
    <div class="fg">
      <label class="fl" for="lg">Identifiant</label>
      <input class="fc" id="lg" autocomplete="username" autofocus>
    </div>
    <div class="fg">
      <label class="fl" for="pw">Mot de passe</label>
      <input class="fc" id="pw" type="password" autocomplete="current-password">
    </div>
    <button class="btn" id="btn-login" onclick="doLogin()">Se connecter</button>
    <div class="err" id="err"></div>
    <div class="notice">
      Accès réservé au personnel d'EPIE Formation.<br>
      En cas d'oubli de mot de passe, contactez la direction.
    </div>
  </div>
  <div class="foot">© EPIE Formation · Saint-Denis — Application RH interne</div>
  <script>
    async function doLogin() {
      const lg = document.getElementById("lg").value.trim();
      const pw = document.getElementById("pw").value;
      const err = document.getElementById("err");
      const btn = document.getElementById("btn-login");
      err.textContent = "";
      if (!lg || !pw) {
        err.textContent = "Identifiant et mot de passe requis";
        return;
      }
      btn.disabled = true;
      btn.textContent = "Connexion…";
      try {
        const r = await fetch("/api/login", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ login:lg, password:pw })
        });
        const data = await r.json();
        if (!r.ok) {
          err.textContent = data.error || "Erreur de connexion";
          btn.disabled = false;
          btn.textContent = "Se connecter";
          return;
        }
        window.location.href = "/";
      } catch(e) {
        err.textContent = "Erreur réseau — vérifiez votre connexion";
        btn.disabled = false;
        btn.textContent = "Se connecter";
      }
    }
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });
  </script>
</body>
</html>
