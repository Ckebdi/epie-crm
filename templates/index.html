<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EPIE Formation · Espace RH</title>
<style>
:root{
  /* Palette EPIE Formation — bleu institutionnel + vert du logo */
  --bl:#1f7fa8;  --bl2:#186a8d;  --bllt:#e8f3f8;
  --g:#5d9b31;   --g2:#4c8127;   --glt:#eef6e7;
  --pu:#178f83;  --pult:#e6f4f2;                 /* teal (remplace le violet) */
  --am:#b45309;  --amlt:#fdf3e4;
  --rd:#c02626;  --rdlt:#fbeaea;
  --ink:#1c2e36; --ink2:#41545d; --ink3:#6d7f87; --ink4:#9aa9b0;
  --s1:#f2f6f8; --s2:#f8fafb; --s3:#e2eaee;
}
*{ box-sizing:border-box; }
html,body{ height:100%; }
body{
  margin:0; background:var(--s1); color:var(--ink);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:14px;
}
button{ font-family:inherit; }
input,select,textarea{ font-family:inherit; }

/* ── Layout ─────────────────────────────────────────── */
.app{ display:flex; height:100vh; overflow:hidden; }
.main{ flex:1; display:flex; flex-direction:column; min-width:0; }
.pages{ flex:1; overflow-y:auto; }
.page{ padding:24px 36px 44px; }

/* ── Sidebar ────────────────────────────────────────── */
.sidebar{
  width:236px; flex-shrink:0; background:#fff; border-right:1px solid var(--s3);
  display:flex; flex-direction:column;
}
.brand{ padding:20px 18px 16px; border-bottom:1px solid var(--s3); }
.brand-word{ font-size:21px; font-weight:800; letter-spacing:.04em; color:var(--bl); line-height:1; }
.brand-word small{
  display:block; font-size:11px; font-weight:600; letter-spacing:.24em;
  color:var(--g); margin-top:2px;
}
.brand-sub{ font-size:11px; color:var(--ink4); margin-top:7px; }
.sb-nav{ flex:1; overflow-y:auto; padding:10px 10px 0; }
.sb-sec{
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.09em;
  color:var(--ink4); margin:16px 8px 6px;
}
.sb-item{
  display:flex; align-items:center; gap:10px; padding:9px 11px; border-radius:8px;
  font-size:13px; color:var(--ink2); cursor:pointer; user-select:none; margin-bottom:2px;
}
.sb-item:hover{ background:var(--s1); }
.sb-item.on{ background:var(--bllt); color:var(--bl2); font-weight:600; }
.sb-ic{ display:inline-flex; width:18px; justify-content:center; color:var(--ink4); }
.sb-item.on .sb-ic{ color:var(--bl); }
.sb-ic svg{ display:block; }
.sb-dot{
  margin-left:auto; background:var(--am); color:#fff; border-radius:999px;
  font-size:10px; font-weight:700; padding:1px 7px;
}
.sb-bottom{ border-top:1px solid var(--s3); padding:12px; }
#btn-export,#btn-backup{ width:100%; justify-content:center; margin-bottom:10px; }
.user-box{ display:flex; align-items:center; gap:9px; }
.user-av{
  width:34px; height:34px; border-radius:50%; background:var(--bllt); color:var(--bl2);
  display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; flex-shrink:0;
}
.user-meta{ flex:1; min-width:0; }
.user-name{ font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-role{ font-size:11px; color:var(--ink3); }
.logout-btn{
  border:1px solid var(--s3); background:#fff; color:var(--ink3); border-radius:8px;
  font-size:11px; padding:6px 9px; cursor:pointer; white-space:nowrap;
}
.logout-btn:hover{ background:var(--rdlt); color:var(--rd); border-color:#f0c9c9; }

/* ── Topbar ─────────────────────────────────────────── */
.topbar{
  height:60px; background:#fff; border-bottom:1px solid var(--s3);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 28px; gap:12px; flex-shrink:0;
}
.tb-title{ font-size:17px; font-weight:700; letter-spacing:-.01em; }
.tb-right{ display:flex; align-items:center; gap:14px; }
.tb-actions{ display:flex; align-items:center; gap:8px; }
.role-pill{
  font-size:11px; font-weight:700; padding:4px 12px; border-radius:999px;
  background:var(--s1); color:var(--ink2);
}
.role-pill.role-directeur{ background:var(--bllt); color:var(--bl2); }
.role-pill.role-rh{ background:var(--pult); color:var(--pu); }
.role-pill.role-employe{ background:var(--glt); color:var(--g2); }

/* ── Boutons ────────────────────────────────────────── */
.btn{
  display:inline-flex; align-items:center; gap:6px; border:none; cursor:pointer;
  border-radius:8px; font-size:13px; font-weight:600; padding:8px 15px;
  background:var(--s1); color:var(--ink2);
}
.btn:hover{ filter:brightness(.95); }
.btn.bg{ background:var(--bl); color:#fff; }
.btn.bg:hover{ background:var(--bl2); filter:none; }
.btn.bbl{ background:var(--pu); color:#fff; }
.btn.bpu{ background:var(--ink2); color:#fff; }
.btn.bap{ background:var(--g2); color:#fff; }
.btn.brj{ background:var(--rd); color:#fff; }
.btn.bgh{ background:#fff; color:var(--ink2); border:1px solid var(--s3); }
.btn.bgh:hover{ background:var(--s2); filter:none; }
.btn.bsm{ font-size:12px; padding:5px 11px; border-radius:7px; }

/* ── Cards ──────────────────────────────────────────── */
.card{
  background:#fff; border:1px solid var(--s3); border-radius:12px;
  margin-bottom:18px; overflow:hidden;
  transition:box-shadow .18s ease, border-color .18s ease;
}
.card:hover{
  box-shadow:0 5px 18px rgba(28,46,54,.08);
  border-color:#d2dfe5;
}
.ch{
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 16px; border-bottom:1px solid var(--s3); gap:10px;
}
.ch-l{ display:flex; align-items:center; gap:12px; }
.ch-ic{ width:10px; height:34px; border-radius:5px; flex-shrink:0; }
.ch-title{ font-size:14px; font-weight:700; }
.ch-sub{ font-size:12px; color:var(--ink3); margin-top:1px; }
.card > .mb{ padding:0; }

/* ── Stat cards / dashboard ─────────────────────────── */
.dash-grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(196px,1fr));
  gap:14px; margin-bottom:24px;
}
.dash-row{ display:grid; grid-template-columns:1.75fr 1fr; gap:24px; align-items:start; }
.sc{
  background:#fff; border:1px solid var(--s3); border-radius:12px;
  padding:12px 14px; border-top:3px solid var(--scb,var(--s3));
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.sc:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 22px rgba(28,46,54,.12);
  border-color:#c9d9e0;
}
.sc-lbl{ font-size:11.5px; font-weight:600; color:var(--ink3); margin-bottom:6px; }
.sc-val{ font-size:22px; font-weight:800; color:var(--scv,var(--ink)); letter-spacing:-.02em; }

/* ── Charts ─────────────────────────────────────────── */
.chart-wrap{
  display:flex; align-items:flex-end; gap:24px; height:264px;
  padding:12px 10px 0; border-bottom:1px solid var(--s3);
}
.bar-group{ display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; min-width:0; }
.bar-inner{ display:flex; align-items:flex-end; gap:6px; height:224px; }
.bar{ border-radius:4px 4px 0 0; min-height:3px; }
.bar-lbl{ font-size:11px; color:var(--ink3); font-weight:600; margin-top:2px; }

/* ── Alertes ────────────────────────────────────────── */
.alert-card{
  background:#fff; border:1px solid var(--s3); border-radius:12px;
  padding:13px 16px; margin-bottom:18px; border-left:4px solid var(--rd);
  transition:box-shadow .18s ease, border-color .18s ease;
}
.alert-card:hover{
  box-shadow:0 5px 18px rgba(28,46,54,.08);
}
.alert-title{ font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--ink2); margin-bottom:8px; }
.alert-row{
  display:flex; align-items:center; justify-content:space-between; gap:8px;
  padding:8px 0; border-bottom:1px solid var(--s2); font-size:12.5px; flex-wrap:wrap;
}
.alert-row:last-child{ border-bottom:none; }

/* ── Tables ─────────────────────────────────────────── */
.tw{ overflow-x:auto; }
table{ width:100%; border-collapse:collapse; }
thead th{
  text-align:left; font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:.05em; color:var(--ink4); padding:10px 16px;
  border-bottom:1px solid var(--s3); background:var(--s2); white-space:nowrap;
}
tbody td{ padding:10px 16px; border-bottom:1px solid var(--s2); font-size:13px; vertical-align:middle; }
tbody tr:last-child td{ border-bottom:none; }
tbody tr:hover{ background:var(--s2); }
.nc{ display:flex; align-items:center; gap:10px; }
.av{
  width:32px; height:32px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700;
}
.nm{ font-weight:600; font-size:13px; }
.dpill{
  display:inline-block; background:var(--s1); border-radius:999px;
  font-size:12px; font-weight:700; padding:2px 10px; color:var(--ink2);
}

/* ── Badges ─────────────────────────────────────────── */
.bdg{
  display:inline-block; font-size:11px; font-weight:600; padding:3px 10px;
  border-radius:999px; white-space:nowrap;
}
.bdg.bcdi{ background:var(--glt); color:var(--g2); }
.bdg.bcdd{ background:var(--bllt); color:var(--bl2); }
.bdg.balt{ background:var(--pult); color:var(--pu); }
.bdg.bae{ background:var(--amlt); color:var(--am); }
.bdg.bstg{ background:#e9eef1; color:var(--ink2); }
.bdg.bcp{ background:var(--bllt); color:var(--bl2); }
.bdg.bcd,.bdg.btyp{ background:#e9eef1; color:var(--ink2); }
.bdg.batt{ background:var(--amlt); color:var(--am); }
.bdg.bapp{ background:var(--glt); color:var(--g2); }
.bdg.bref{ background:var(--rdlt); color:var(--rd); }
.bdg.bmal{ background:var(--rdlt); color:var(--rd); }
.bdg.bpu{ background:var(--pult); color:var(--pu); }
.bdg.bbl{ background:var(--bllt); color:var(--bl2); }
.bdg.babs{ background:var(--rdlt); color:var(--rd); }
.bdg.bret{ background:var(--amlt); color:var(--am); }
.bdg.bjst{ background:var(--glt); color:var(--g2); }
.bdg.bnjst{ background:var(--rdlt); color:var(--rd); }
.bsmp{
  display:inline-block; font-size:10px; font-weight:700; padding:2px 8px;
  border-radius:999px; background:var(--amlt); color:var(--am);
}
.role-tag-d{ font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; background:var(--bllt); color:var(--bl2); }
.role-tag-r{ font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; background:var(--pult); color:var(--pu); }
.role-tag-e{ font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; background:var(--glt); color:var(--g2); }

/* ── Filtres ────────────────────────────────────────── */
.filt{ display:flex; gap:8px; flex-wrap:wrap; padding:11px 16px; border-bottom:1px solid var(--s3); background:var(--s2); }
.fi{
  border:1px solid var(--s3); border-radius:8px; padding:7px 11px;
  font-size:13px; background:#fff; color:var(--ink);
}
.fi:focus{ outline:none; border-color:var(--bl); }

/* ── Formulaires ────────────────────────────────────── */
.fr{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.fg{ margin-bottom:14px; }
.fl{ display:block; font-size:12px; font-weight:600; color:var(--ink2); margin-bottom:5px; }
.fc{
  width:100%; border:1px solid var(--s3); border-radius:8px; padding:8px 11px;
  font-size:13px; background:#fff; color:var(--ink);
}
.fc:focus{ outline:none; border-color:var(--bl); box-shadow:0 0 0 3px var(--bllt); }
textarea.fc{ resize:vertical; }

/* ── Modales ────────────────────────────────────────── */
.mbg{
  position:fixed; inset:0; background:rgba(28,46,54,.45); z-index:100;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.modal{
  background:#fff; border-radius:14px; width:min(600px,94vw);
  max-height:88vh; display:flex; flex-direction:column;
  box-shadow:0 20px 60px rgba(28,46,54,.3);
}
.mh{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; padding:17px 20px 13px; }
.mt{ font-size:16px; font-weight:700; }
.mx{
  border:none; background:var(--s1); color:var(--ink3); border-radius:8px;
  width:28px; height:28px; cursor:pointer; font-size:13px; flex-shrink:0;
}
.mx:hover{ background:var(--rdlt); color:var(--rd); }
.mdiv{ border-top:1px solid var(--s3); }
.modal .mb{ padding:17px 20px; overflow-y:auto; }
.mf{ display:flex; justify-content:flex-end; gap:8px; padding:13px 20px 17px; border-top:1px solid var(--s3); }

/* ── Fiche / profil ─────────────────────────────────── */
.ph{ display:flex; align-items:center; gap:14px; }
.avlg{
  width:54px; height:54px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700;
}
.pn{ font-size:17px; font-weight:700; }
.pp{ font-size:13px; color:var(--ink3); margin:1px 0 6px; }
.pfs{ display:grid; grid-template-columns:1fr 1fr; gap:13px 16px; padding:14px 16px; }
.modal .pfs{ padding:0 0 6px; }
.pf{ min-width:0; }
.pfl{ font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--ink4); margin-bottom:4px; }
.pfv{ font-size:13.5px; font-weight:500; word-break:break-word; }
.ssep{
  font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em;
  color:var(--ink4); margin:18px 0 8px; padding-top:14px; border-top:1px solid var(--s3);
}
.cr{
  display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
  padding:10px 0; border-bottom:1px solid var(--s2);
}
.cr:last-child{ border-bottom:none; }
.ci{ font-size:13px; font-weight:600; }
.cd{ font-size:12px; color:var(--ink3); }

/* ── Divers ─────────────────────────────────────────── */
.info-box{
  display:flex; gap:9px; align-items:flex-start; background:var(--bllt); border:1px solid #cbe2ee;
  color:var(--bl2); border-radius:10px; padding:11px 14px; font-size:12.5px; margin-bottom:16px;
}
.note-refus-box{
  display:flex; gap:9px; align-items:flex-start; background:var(--rdlt); border:1px solid #efd0d0;
  color:var(--rd); border-radius:10px; padding:10px 13px; font-size:12.5px;
}
.welcome{
  background:#fff; border:1px solid var(--s3); border-left:4px solid var(--bl);
  border-radius:12px; padding:18px 20px; margin-bottom:18px;
}
.welcome-name{ font-size:21px; font-weight:800; margin-bottom:4px; letter-spacing:-.01em; }
.welcome-sub{ font-size:13px; color:var(--ink3); }
.solde-bar-wrap{ margin-top:16px; max-width:440px; }
.solde-label{ display:flex; justify-content:space-between; font-size:12.5px; color:var(--ink2); margin-bottom:6px; }
.solde-bar{ height:8px; background:var(--s3); border-radius:4px; overflow:hidden; }
.solde-fill{ height:100%; border-radius:4px; }
.syn-grid{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:12px; margin-top:18px;
}
.syn{ background:var(--s2); border:1px solid var(--s3); border-radius:10px; padding:11px 13px; }
.syn-l{
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.07em;
  color:var(--ink4); margin-bottom:5px;
}
.syn-v{ font-size:15px; font-weight:700; }
.empty{ text-align:center; padding:24px 10px; }
.ei{ margin-bottom:8px; }
.ei svg{ display:inline-block; }
.et{ font-size:13px; color:var(--ink3); }
.toast{
  position:fixed; bottom:22px; right:22px; z-index:200;
  background:var(--ink); color:#fff; font-size:13px; font-weight:500;
  padding:11px 17px; border-radius:10px; box-shadow:0 8px 24px rgba(28,46,54,.25);
  animation:toastin .2s ease;
}
@keyframes toastin{ from{ opacity:0; transform:translateY(8px);} to{ opacity:1; transform:none;} }

@media (max-width:820px){
  .sidebar{ width:62px; }
  .brand{ padding:14px 8px; text-align:center; }
  .brand-word{ font-size:15px; }
  .brand-word small,.brand-sub,.user-meta,.sb-sec{ display:none; }
  .sb-item{ justify-content:center; font-size:0; gap:0; }
  .sb-dot{ display:none !important; }
  #btn-export{ font-size:0; }
  .dash-row{ grid-template-columns:1fr; }
  .fr,.pfs{ grid-template-columns:1fr; }
  .page{ padding:16px 14px 40px; }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-word">EPIE<small>formation</small></div>
      <div class="brand-sub">Espace Ressources Humaines</div>
    </div>
    <nav id="sidebar-nav" class="sb-nav"></nav>
    <div class="sb-bottom">
      <button class="btn bgh" id="btn-export" style="display:none;" onclick="exportExcel()">Export Excel</button>
      <button class="btn bgh" id="btn-backup" style="display:none;" onclick="doBackup()">Sauvegarder la base</button>
      <div class="user-box">
        <div class="user-av" id="user-av"></div>
        <div class="user-meta">
          <div class="user-name" id="user-name"></div>
          <div class="user-role" id="user-role-lbl"></div>
        </div>
        <button class="logout-btn" onclick="doLogout()">Quitter</button>
      </div>
    </div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="tb-title" id="tb-title"></div>
      <div class="tb-right">
        <div class="tb-actions" id="tb-actions"></div>
        <span class="role-pill" id="role-pill"></span>
      </div>
    </header>
    <div class="pages" id="pages"></div>
  </main>
</div>
<div id="mc"></div>
<script>
const AVC = [
  ["#d1fae5","#065f46"],
  ["#dbeafe","#1e40af"],
  ["#e6f4f2","#5b21b6"],
  ["#fef3c7","#92400e"],
  ["#ffedd5","#9a3412"],
  ["#fce7f3","#9d174d"],
  ["#e9eef1","#111827"],
];
const avS = id => {
  const c = AVC[(id || 1) % AVC.length];
  return `background:${c[0]};color:${c[1]};`;
};
const ini = (p,n) => (p?.[0] || "") + (n?.[0] || "");

function fD(d) {
  if (!d) return "";
  const [y,m,j] = d.split("-");
  return `${j}/${m}/${y}`;
}
function dys(a,b) {
  const v = Math.round((new Date(b) - new Date(a)) / 86400000) + 1;
  return v > 0 ? v : 1;
}
function esc(s) {
  s = String(s || "");
  return s
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
const TODAY = new Date().toISOString().slice(0,10);

let ME = null, employees = [], conges = [], absences = [], users = [], dashData = null;

const BC = {
  "CDI":"bcdi",
  "CDD":"bcdd",
  "Alternant":"balt",
  "Autoentrepreneur":"bae",
  "Stagiaire":"bstg",
  "Contrat pro":"bcp"
};
const BS = {
  "En attente":"batt",
  "Approuvé":"bapp",
  "Refusé":"bref"
};
const BT = {
  "Maladie":"bmal",
  "RTT":"bae",
  "Congés payés":"bapp",
  "Congé maternité":"bpu",
  "Congé paternité":"bbl",
  "Congé exceptionnel":"balt",
  "Demi-journée":"bstg",
  "Autre":"btyp"
};

function seniorityLabel(debut) {
  if (!debut) return null;
  const d0 = new Date(debut);
  if (isNaN(d0)) return null;
  const now = new Date();
  let years = now.getFullYear() - d0.getFullYear();
  let months = now.getMonth() - d0.getMonth();
  if (months < 0) {
    years -= 1;
    months += 12;
  }
  if (years < 0) return null;
  const pa = years > 1 ? "ans" : "an";
  const pm = "mois";
  if (years === 0 && months === 0) return "Moins d'un mois";
  if (years === 0) return `${months} ${pm} d'ancienneté`;
  if (months === 0) return `${years} ${pa} d'ancienneté`;
  return `${years} ${pa} et ${months} ${pm} d'ancienneté`;
}

function myCongesByMonth(empId) {
  const map = {};
  const now = new Date();
  const sixMonthsAgo = new Date(now);
  sixMonthsAgo.setMonth(now.getMonth() - 5);
  for (const c of conges || []) {
    if (c.emp_id !== empId) continue;
    const d = c.debut ? new Date(c.debut) : null;
    if (!d || isNaN(d) || d < sixMonthsAgo) continue;
    const ym = d.toISOString().slice(0,7);
    if (!map[ym]) map[ym] = { mois: ym, total: 0, approuves: 0 };
    map[ym].total += 1;
    if (c.statut === "Approuvé") map[ym].approuves += 1;
  }
  return Object.values(map).sort((a,b) => a.mois.localeCompare(b.mois));
}
function myCongesByType(empId) {
  const map = {};
  for (const c of conges || []) {
    if (c.emp_id !== empId) continue;
    const key = c.type || "Autre";
    if (!map[key]) map[key] = { type: key, total: 0, approuves: 0 };
    map[key].total += 1;
    if (c.statut === "Approuvé") map[key].approuves += 1;
  }
  return Object.values(map).sort((a,b) => a.type.localeCompare(b.type));
}

async function api(url, method="GET", body=null) {
  const opt = { method, headers: { "Content-Type":"application/json" } };
  if (body) opt.body = JSON.stringify(body);
  const r = await fetch(url, opt);
  if (r.status === 401) {
    window.location.href = "/login";
    return null;
  }
  const data = await r.json();
  if (!r.ok && data && data.error) {
    alert(data.error);
    return null;
  }
  return data;
}

  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;

}

    monespace:"Ma fiche",

  document.getElementById("tb-title").textContent = titles[tab] || "";

function filterEmp() {
  const q = document.getElementById("search").value.toLowerCase();
  const fc = document.getElementById("fc-f").value;
  const fac = document.getElementById("fc-anc").value;
  const sort = document.getElementById("fc-sort").value;
  const today = new Date();

  let list = employees.filter(e => {
    const matchText = !q || ((e.prenom + " " + e.nom + " " + (e.poste || "")).toLowerCase().includes(q));
    const matchContrat = !fc || e.contrat === fc;
    let matchAnc = true;
    if (fac) {
      let years = null;
      if (e.debut) {
        const d0 = new Date(e.debut);
        if (!isNaN(d0)) {
          const deltaDays = (today - d0) / 86400000;
          years = deltaDays / 365.0;
        }
      }
      if (years === null || years < 0) {
        matchAnc = false;
      } else if (fac === "lt2") {
        matchAnc = years < 2;
      } else if (fac === "2to5") {
        matchAnc = years >= 2 && years < 5;
      } else if (fac === "gte5") {
        matchAnc = years >= 5;
      }
    }
    return matchText && matchContrat && matchAnc;
  });

  if (sort === "anc-desc" || sort === "anc-asc") {
    list = list.slice().sort((a,b) => {
      const da = a.debut ? new Date(a.debut) : null;
      const db = b.debut ? new Date(b.debut) : null;
      if (!da && !db) return 0;
      if (!da) return 1;
      if (!db) return -1;
      return sort === "anc-desc" ? (da - db) : (db - da);
    });
  }
  renderEmpTable(list);
}

let auditRows = [];

async function buildAudit(pages, acts) {
  acts.innerHTML = "";
  pages.innerHTML = `<div class="page"><div class="empty"><div class="et">Chargement…</div></div></div>`;
  auditRows = await api("/api/audit") || [];
  pages.innerHTML = `
    <div class="page">

        <div class="ch">
          <div class="ch-l">
            <div class="ch-ic" style="background:#e6f4f2"></div>
            <div>
              <div class="ch-title">Journal d'audit</div>
              <div class="ch-sub">${auditRows.length} événement${auditRows.length > 1 ? "s" : ""} · 500 max affichés</div>
            </div>
          </div>
          <input class="fi" id="audit-q" placeholder="Filtrer (utilisateur, action…)" oninput="renderAudit()" style="min-width:220px;">
        </div>
        <div class="mb">
          <div class="tw">
            <table>
              <thead>
                <tr>
                  <th>Date / heure</th>
                  <th>Utilisateur</th>
                  <th>Action</th>
                  <th>Détails</th>
                </tr>
              </thead>
              <tbody id="audit-tb"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  `;
  renderAudit();
}

function renderAudit() {
  const tb = document.getElementById("audit-tb");
  if (!tb) return;
  const q = (document.getElementById("audit-q")?.value || "").toLowerCase();
  const list = auditRows.filter(r =>
    !q || `${r.user_login} ${r.action} ${r.details}`.toLowerCase().includes(q)
  );
  const badge = a =>
    a.includes("approuvé") || a.includes("réussie") ? "bapp"
    : (a.includes("refusé") || a.includes("supprimé")) ? "bref"
    : (a.includes("échouée") || a.includes("bloqué")) ? "bret"
    : a.includes("Compte") ? "bbl"
    : "btyp";
  tb.innerHTML = list.length ? list.map(r => `
    <tr>
      <td style="white-space:nowrap;color:var(--ink3);font-size:12px;">${esc(r.ts || "")}</td>
      <td style="font-weight:600;font-size:13px;">${esc(r.user_login || "")}</td>
      <td><span class="bdg ${badge(r.action || "")}">${esc(r.action || "")}</span></td>
      <td style="color:var(--ink3);font-size:12px;">${esc(r.details || "")}</td>
    </tr>
  `).join("") : `
    <tr>
      <td colspan="4">
        <div class="empty"><div class="et">Aucun événement</div></div>
      </td>
    </tr>
  `;
}

/* ───────────────────────── Actions / Modales ───────────────── */

async function approuverCg(id, statut, noteRefus="") {
  const c = await api(`/api/conges/${id}`, "PUT", { statut, note_refus: noteRefus });
  if (!c) return;
  const i = conges.findIndex(x => x.id === id);
  if (i >= 0) conges[i] = c;
  await loadData();
  showTab("conges");
  toast(statut === "Approuvé" ? "Demande approuvée" : "Demande refusée");
}

function openRefusModal(id) {
  const c = conges.find(x => x.id === id);
  document.getElementById("mc").innerHTML = `
    <div class="mbg" onclick="bgce(event)">
      <div class="modal">
        <div class="mh">
          <div class="mt">Refuser la demande</div>
          <button class="mx" onclick="closeModal()">✕</button>
        </div>
        <div class="mdiv"></div>
        <div class="mb">
          <div style="background:var(--rdlt);border-radius:10px;padding:11px 13px;margin-bottom:16px;font-size:13px;color:var(--rd);">
            <strong>${c ? esc(c.emp_nom) : ""}</strong><br>
            ${c ? esc(c.type || "") + " " + fD(c.debut) + " → " + fD(c.fin) : ""}
          </div>
          <div class="fg">
            <label class="fl">Raison du refus (optionnel)</label>
            <textarea class="fc" id="note-refus" rows="3" placeholder="Ex : Planning chargé sur cette période, merci de proposer d'autres dates..."></textarea>
          </div>
        </div>
        <div class="mf">
          <button class="btn bgh" onclick="closeModal()">Annuler</button>
          <button class="btn brj" onclick="confirmRefus(${id})">Confirmer le refus</button>
        </div>
      </div>
    </div>
  `;
}
async function confirmRefus(id) {
  const note = document.getElementById("note-refus").value.trim();
  closeModal();
  await approuverCg(id, "Refusé", note);
}

async function delUser(id) {
  if (!confirm("Supprimer ce compte ?")) return;
  const r = await api(`/api/users/${id}`, "DELETE");
  if (!r) return;
  users = users.filter(u => u.id !== id);
  showTab("users");
  toast("Compte supprimé");
}

async function doLogout() {
  await api("/api/logout", "POST");
  window.location.href = "/login";
}

function exportExcel() {
  window.location.href = "/api/export";
  toast("Export en cours");
}

async function doBackup() {
  const r = await api("/api/backup", "POST");
  if (!r) return;
  toast(`Sauvegarde créée : ${r.fichier}`);
}

function toggleRetardDuree() {
  const typeEl = document.getElementById("at");
  const fg = document.getElementById("fg-duree");
  if (!typeEl || !fg) return;
  fg.style.display = typeEl.value === "Retard" ? "block" : "none";
}

        <input class="fc" id="imp-ca-file" type="file" accept=".xlsx">
      </div>
    `;
    fh = `
      <button class="btn bgh" onclick="closeModal()">Annuler</button>
      <button class="btn bg" onclick="doImportCA()">Importer</button>
    `;
  }

  document.getElementById("mc").innerHTML = `
    <div class="mbg" onclick="bgce(event)">
      <div class="modal">
        <div class="mh">
          ${hh}
          <button class="mx" onclick="closeModal()">✕</button>
        </div>
        <div class="mdiv"></div>
        <div class="mb">${bh}</div>
        <div class="mf">${fh}</div>
      </div>
    </div>
  `;
}

function bgce(e) {
  if (e.target.classList.contains("mbg")) closeModal();
}
function closeModal() {
  document.getElementById("mc").innerHTML = "";
}

/* ───────────────────────── CRUD helpers ───────────────────── */

async function addEmp() {
  const p = document.getElementById("fp").value.trim();
  const n = document.getElementById("fn").value.trim();
  if (!p || !n) {
    alert("Prénom et nom requis");
    return;
  }
  const emp = await api("/api/employees", "POST", {
    prenom: p,
    nom: n,
    poste: document.getElementById("fpo").value.trim(),
    contrat: document.getElementById("fct").value,
    email: document.getElementById("fem").value.trim(),
    tel: document.getElementById("fte").value.trim(),
    debut: document.getElementById("fdb").value,
    date_fin: document.getElementById("fdf").value || null,
    solde_cp: parseInt(document.getElementById("fcp").value || "25", 10)
  });
  if (!emp) return;
  employees.push(emp);
  closeModal();
  showTab("annuaire");
  toast(`${p} ${n} ajouté`);
}

async function saveEmp(id) {
  const emp = await api(`/api/employees/${id}`, "PUT", {
    prenom: document.getElementById("fp").value.trim(),
    nom: document.getElementById("fn").value.trim(),
    poste: document.getElementById("fpo").value.trim(),
    contrat: document.getElementById("fct").value,
    email: document.getElementById("fem").value.trim(),
    tel: document.getElementById("fte").value.trim(),
    debut: document.getElementById("fdb").value,
    date_fin: document.getElementById("fdf").value || null,
    solde_cp: parseInt(document.getElementById("fcp").value || "0", 10)
  });
  if (!emp) return;
  const i = employees.findIndex(e => e.id === id);
  if (i >= 0) employees[i] = emp;
  closeModal();
  showTab("annuaire");
  toast("Fiche mise à jour");
}

async function saveSelf(id) {
  const emp = await api(`/api/employees/${id}`, "PUT", {
    email: document.getElementById("fem").value.trim(),
    tel: document.getElementById("fte").value.trim()
  });
  if (!emp) return;
  ME.employee = emp;
  closeModal();
  showTab("monespace");
  toast("Coordonnées mises à jour");
}

async function addCg() {
  const debut = document.getElementById("cd").value;
  const fin = document.getElementById("cf").value;
  if (!debut || !fin) {
    alert("Dates requises");
    return;
  }
  const body = {
    type: document.getElementById("ct").value,
    debut,
    fin,
    creneau: document.getElementById("cren").value,
    motif: document.getElementById("cm").value.trim()
  };
  const ceEl = document.getElementById("ce");
  if (ceEl) body.emp_id = parseInt(ceEl.value, 10);
  const c = await api("/api/conges", "POST", body);
  if (!c) return;
  conges.unshift(c);
  updateBadge();
  closeModal();
  showTab(ME.current_user.role === "employe" ? "mesconges" : "conges");
  toast("Demande soumise");
}

async function addAbs() {
  const type = document.getElementById("at").value;
  let duree = 0;
  if (type === "Retard") {
    const v = document.getElementById("adur").value;
    duree = parseInt(v || "0", 10);
    if (isNaN(duree) || duree < 0) duree = 0;
  }
  const a = await api("/api/absences", "POST", {
    emp_id: parseInt(document.getElementById("ae").value, 10),
    date: document.getElementById("ad").value,
    type: type,
    justifiee: document.getElementById("aj").value === "1",
    note: document.getElementById("an").value.trim(),
    duree: duree
  });
  if (!a) return;
  absences.unshift(a);
  closeModal();
  showTab("absences");
  toast("Absence enregistrée");
}

async function addUser() {
  const login = document.getElementById("ul").value.trim();
  const pw = document.getElementById("up").value;
  if (!login || !pw) {
    alert("Login et mot de passe requis");
    return;
  }
  const uep = document.getElementById("uep").value;
  const r = await api("/api/users", "POST", {
    login,
    password: pw,
    role: document.getElementById("ur").value,
    emp_id: uep || null
  });
  if (!r) return;
  users = await api("/api/users") || [];
  closeModal();
  showTab("users");
  toast("Compte créé");
}

async function saveUser(id) {
  const pw = document.getElementById("up").value;
  const uep = document.getElementById("uep").value;
  const body = {
    role: document.getElementById("ur").value,
    emp_id: uep || null
  };
  if (pw) body.password = pw;
  const r = await api(`/api/users/${id}`, "PUT", body);
  if (!r) return;
  users = await api("/api/users") || [];
  closeModal();
  showTab("users");
  toast("Compte mis à jour");
}

async function changePass() {
  const oldp = document.getElementById("op").value;
  const np = document.getElementById("np").value;
  const np2 = document.getElementById("np2").value;
  if (!oldp || !np || !np2) {
    alert("Tous les champs sont requis");
    return;
  }
  if (np !== np2) {
    alert("La confirmation ne correspond pas");
    return;
  }
  const r = await api("/api/change-password", "POST", {
    old_password: oldp,
    new_password: np
  });
  if (!r) return;
  closeModal();
  toast("Mot de passe mis à jour");
}

/* ───────────────────────── Import helpers ────────────────── */

async function doImportEmp() {
  const input = document.getElementById("imp-file");
  if (!input || !input.files || !input.files[0]) {
    alert("Veuillez sélectionner un fichier Excel");
    return;
  }
  const fd = new FormData();
  fd.append("file", input.files[0]);
  try {
    const r = await fetch("/api/import-employees", { method:"POST", body: fd });
    const data = await r.json();
    if (!r.ok) {
      alert(data.error || "Erreur lors de l'import");
      return;
    }
    employees = await api("/api/employees") || [];
    closeModal();
    showTab("annuaire");
    toast(`Import terminé : ${data.imported} ajoutés, ${data.updated} mis à jour, ${data.skipped} ignorés`);
  } catch {
    alert("Erreur réseau lors de l'import");
  }
}

async function doImportCA() {
  const input = document.getElementById("imp-ca-file");
  if (!input || !input.files || !input.files[0]) {
    alert("Veuillez sélectionner un fichier Excel");
    return;
  }
  const fd = new FormData();
  fd.append("file", input.files[0]);
  try {
    const r = await fetch("/api/import-conges-absences", { method:"POST", body: fd });
    const data = await r.json();
    if (!r.ok) {
      alert(data.error || "Erreur lors de l'import");
      return;
    }
    conges = await api("/api/conges") || [];
    absences = await api("/api/absences") || [];
    closeModal();
    showTab("conges");
    toast(`Import terminé - Congés: ${data.imported_conges} ajoutés, Absences: ${data.imported_absences} ajoutées`);
  } catch {
    alert("Erreur réseau lors de l'import");
  }
}

window.addEventListener("load", init);
</script>
</body>
